; output (Y) via an 8-point piecewise-linear table.
; Slot → target sensor: 1=TPS1P, 2=TPS1S, 3=TPS2P, 4=TPS2S,
;                        5=PPSP,  6=PPSS,  7=MAP,    8=BARO

